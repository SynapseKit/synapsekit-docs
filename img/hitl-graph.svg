<svg width="580" height="400" viewBox="0 0 580 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="g-start" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g-approve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g-review" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="g-reject" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="g-audit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/><stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-y" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/></filter>
  </defs>

  <rect width="580" height="400" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="290" y="26" fill="#0f172a" font-size="14" font-weight="700" text-anchor="middle">HITL Graph — Content Moderation Workflow</text>

  <!-- classify_content node (top center) -->
  <rect x="175" y="48" width="230" height="60" rx="10" fill="url(#g-start)" filter="url(#sh)"/>
  <text x="290" y="73" fill="white" font-size="13" font-weight="700" text-anchor="middle">classify_content</text>
  <text x="290" y="92" fill="#c7d2fe" font-size="11" text-anchor="middle">LLM-based scoring (0.0 – 1.0)</text>

  <!-- Fan-out lines from classify to three branches -->
  <!-- Left branch (score >= 0.9) -->
  <line x1="220" y1="108" x2="100" y2="168" stroke="#10b981" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="128" y="142" fill="#059669" font-size="10" font-weight="600" text-anchor="middle">score ≥ 0.9</text>

  <!-- Middle branch (0.4 – 0.9) -->
  <line x1="290" y1="108" x2="290" y2="168" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-y)"/>
  <text x="316" y="142" fill="#d97706" font-size="10" font-weight="600">0.4 ≤ score &lt; 0.9</text>

  <!-- Right branch (score < 0.4) -->
  <line x1="360" y1="108" x2="480" y2="168" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="448" y="142" fill="#dc2626" font-size="10" font-weight="600" text-anchor="middle">score &lt; 0.4</text>

  <!-- auto_approve node -->
  <rect x="20" y="170" width="160" height="66" rx="10" fill="url(#g-approve)" filter="url(#sh)"/>
  <text x="100" y="196" fill="white" font-size="12" font-weight="700" text-anchor="middle">auto_approve</text>
  <text x="100" y="213" fill="#a7f3d0" font-size="10" text-anchor="middle">skip human review</text>
  <text x="100" y="228" fill="#a7f3d0" font-size="10" text-anchor="middle">approved = True</text>

  <!-- flag_for_review node -->
  <rect x="210" y="170" width="160" height="66" rx="10" fill="url(#g-review)" filter="url(#sh)"/>
  <text x="290" y="193" fill="white" font-size="12" font-weight="700" text-anchor="middle">flag_for_review</text>
  <text x="290" y="210" fill="#fef3c7" font-size="10" text-anchor="middle">GraphInterrupt</text>
  <text x="290" y="225" fill="#fef3c7" font-size="10" text-anchor="middle">awaits human decision</text>

  <!-- auto_reject node -->
  <rect x="400" y="170" width="160" height="66" rx="10" fill="url(#g-reject)" filter="url(#sh)"/>
  <text x="480" y="196" fill="white" font-size="12" font-weight="700" text-anchor="middle">auto_reject</text>
  <text x="480" y="213" fill="#fecaca" font-size="10" text-anchor="middle">skip human review</text>
  <text x="480" y="228" fill="#fecaca" font-size="10" text-anchor="middle">approved = False</text>

  <!-- Human approval badge on flag_for_review -->
  <rect x="240" y="244" width="100" height="20" rx="10" fill="#92400e"/>
  <text x="290" y="258" fill="#fef3c7" font-size="9" font-weight="600" text-anchor="middle">⏸ Human Gate</text>

  <!-- Converge lines to audit -->
  <line x1="100" y1="236" x2="100" y2="318" stroke="#64748b" stroke-width="1.5"/>
  <line x1="100" y1="318" x2="262" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="290" y1="266" x2="290" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="480" y1="236" x2="480" y2="318" stroke="#64748b" stroke-width="1.5"/>
  <line x1="480" y1="318" x2="318" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- audit node -->
  <rect x="210" y="320" width="160" height="54" rx="10" fill="url(#g-audit)" filter="url(#sh)"/>
  <text x="290" y="343" fill="white" font-size="13" font-weight="700" text-anchor="middle">audit</text>
  <text x="290" y="362" fill="#94a3b8" font-size="10" text-anchor="middle">log decision + metadata</text>
</svg>
