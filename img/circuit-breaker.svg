<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="g-closed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g-open" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="g-half" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/></filter>
  </defs>

  <rect width="600" height="260" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="300" y="26" fill="#0f172a" font-size="13" font-weight="700" text-anchor="middle">Circuit Breaker State Machine</text>

  <!-- CLOSED -->
  <circle cx="100" cy="140" r="64" fill="url(#g-closed)" filter="url(#sh)"/>
  <text x="100" y="132" fill="white" font-size="13" font-weight="700" text-anchor="middle">CLOSED</text>
  <text x="100" y="150" fill="#a7f3d0" font-size="10" text-anchor="middle">Normal operation</text>
  <text x="100" y="164" fill="#a7f3d0" font-size="10" text-anchor="middle">requests allowed</text>

  <!-- OPEN -->
  <circle cx="500" cy="140" r="64" fill="url(#g-open)" filter="url(#sh)"/>
  <text x="500" y="132" fill="white" font-size="13" font-weight="700" text-anchor="middle">OPEN</text>
  <text x="500" y="150" fill="#fca5a5" font-size="10" text-anchor="middle">Budget exceeded</text>
  <text x="500" y="164" fill="#fca5a5" font-size="10" text-anchor="middle">all blocked</text>

  <!-- HALF_OPEN -->
  <circle cx="300" cy="140" r="64" fill="url(#g-half)" filter="url(#sh)"/>
  <text x="300" y="125" fill="white" font-size="12" font-weight="700" text-anchor="middle">HALF</text>
  <text x="300" y="141" fill="white" font-size="12" font-weight="700" text-anchor="middle">OPEN</text>
  <text x="300" y="159" fill="#fef3c7" font-size="10" text-anchor="middle">probe requests</text>
  <text x="300" y="173" fill="#fef3c7" font-size="10" text-anchor="middle">allowed</text>

  <!-- CLOSED → OPEN arrow (top) -->
  <path d="M 163,115 Q 300,55 437,115" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="300" y="70" fill="#475569" font-size="10" font-weight="600" text-anchor="middle">N failures / budget exceeded</text>

  <!-- OPEN → HALF_OPEN arrow (below, right to left) -->
  <path d="M 437,163 Q 368,215 365,175" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="420" y="215" fill="#475569" font-size="10" font-weight="600" text-anchor="middle">cooldown_seconds elapsed</text>

  <!-- HALF_OPEN → CLOSED (success) -->
  <path d="M 237,163 Q 168,215 165,175" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="175" y="217" fill="#059669" font-size="10" font-weight="600" text-anchor="middle">success ✓</text>

  <!-- HALF_OPEN → OPEN (failure) -->
  <path d="M 363,115 Q 430,80 438,117" stroke="#dc2626" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="415" y="80" fill="#dc2626" font-size="10" font-weight="600" text-anchor="middle">failure ✗</text>
</svg>
