<svg width="520" height="440" viewBox="0 0 520 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="g-user" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g-thought" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284c7"/><stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="g-action" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="g-obs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g-answer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-back" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/></filter>
  </defs>

  <rect width="520" height="440" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="260" y="28" fill="#0f172a" font-size="14" font-weight="700" text-anchor="middle">ReAct Loop (Reasoning + Acting)</text>

  <!-- User task -->
  <rect x="160" y="44" width="200" height="44" rx="22" fill="url(#g-user)" filter="url(#sh)"/>
  <text x="260" y="72" fill="white" font-size="13" font-weight="600" text-anchor="middle">User Task</text>
  <line x1="260" y1="88" x2="260" y2="108" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Thought -->
  <rect x="80" y="110" width="360" height="60" rx="10" fill="url(#g-thought)" filter="url(#sh)"/>
  <text x="260" y="132" fill="white" font-size="13" font-weight="700" text-anchor="middle">Thought</text>
  <text x="260" y="152" fill="#bae6fd" font-size="11" text-anchor="middle">LLM reasons about what to do next</text>
  <text x="260" y="166" fill="#bae6fd" font-size="11" text-anchor="middle">"I need to search for the current stock price."</text>
  <line x1="260" y1="170" x2="260" y2="192" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Action -->
  <rect x="80" y="194" width="360" height="60" rx="10" fill="url(#g-action)" filter="url(#sh)"/>
  <text x="260" y="216" fill="white" font-size="13" font-weight="700" text-anchor="middle">Action</text>
  <text x="260" y="236" fill="#fef3c7" font-size="11" text-anchor="middle">LLM selects a tool and calls it</text>
  <text x="260" y="250" fill="#fef3c7" font-size="11" text-anchor="middle">search_web("AAPL stock price")</text>
  <line x1="260" y1="254" x2="260" y2="276" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Observation -->
  <rect x="80" y="278" width="360" height="60" rx="10" fill="url(#g-obs)" filter="url(#sh)"/>
  <text x="260" y="300" fill="white" font-size="13" font-weight="700" text-anchor="middle">Observation</text>
  <text x="260" y="320" fill="#a7f3d0" font-size="11" text-anchor="middle">Tool executes and returns result</text>
  <text x="260" y="334" fill="#a7f3d0" font-size="11" text-anchor="middle">"AAPL is currently trading at $189.45"</text>

  <!-- Loop back arrow -->
  <path d="M 80,308 Q 36,308 36,218 Q 36,128 80,140" stroke="#7c3aed" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr-back)"/>
  <text x="22" y="222" fill="#7c3aed" font-size="10" font-weight="600" text-anchor="middle" transform="rotate(-90,22,222)">Loop until done</text>

  <!-- Decision diamond -->
  <polygon points="260,360 310,390 260,420 210,390" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="260" y="385" fill="#475569" font-size="11" font-weight="600" text-anchor="middle">Done?</text>
  <text x="260" y="397" fill="#475569" font-size="10" text-anchor="middle">Final Answer</text>
  <line x1="260" y1="338" x2="260" y2="358" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Yes → Answer -->
  <line x1="310" y1="390" x2="390" y2="390" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="348" y="383" fill="#64748b" font-size="10" text-anchor="middle">Yes</text>
  <rect x="392" y="368" width="88" height="44" rx="22" fill="url(#g-answer)" filter="url(#sh)"/>
  <text x="436" y="390" fill="white" font-size="12" font-weight="600" text-anchor="middle">Answer</text>
  <text x="436" y="406" fill="#99f6e4" font-size="10" text-anchor="middle">returned</text>

  <!-- No → back up -->
  <path d="M 210,390 Q 60,390 60,340 Q 60,278 80,298" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="85" y="395" fill="#64748b" font-size="10">No — next step</text>

  <!-- max_steps guard note -->
  <text x="260" y="432" fill="#94a3b8" font-size="10" text-anchor="middle">max_steps guard raises MaxStepsExceeded to prevent infinite loops</text>
</svg>
