<svg width="480" height="500" viewBox="0 0 480 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="g-q" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284c7"/><stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="g-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="g-4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="g-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/></filter>
  </defs>

  <rect width="480" height="500" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="240" y="28" fill="#0f172a" font-size="14" font-weight="700" text-anchor="middle">RAG Pipeline</text>

  <!-- Question -->
  <rect x="140" y="44" width="200" height="44" rx="22" fill="url(#g-q)" filter="url(#sh)"/>
  <text x="240" y="72" fill="white" font-size="13" font-weight="600" text-anchor="middle">Your Question</text>
  <line x1="240" y1="88" x2="240" y2="108" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 1 -->
  <rect x="60" y="110" width="360" height="56" rx="10" fill="url(#g-1)" filter="url(#sh)"/>
  <circle cx="90" cy="138" r="14" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1.5"/>
  <text x="90" y="138" fill="white" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="240" y="133" fill="white" font-size="13" font-weight="600" text-anchor="middle">Embed Question</text>
  <text x="240" y="152" fill="#bae6fd" font-size="11" text-anchor="middle">"What is SynapseKit?" → [0.23, −0.41, 0.87, …] (1536 dims)</text>
  <line x1="240" y1="166" x2="240" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="60" y="188" width="360" height="56" rx="10" fill="url(#g-2)" filter="url(#sh)"/>
  <circle cx="90" cy="216" r="14" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1.5"/>
  <text x="90" y="216" fill="white" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="central">2</text>
  <text x="240" y="211" fill="white" font-size="13" font-weight="600" text-anchor="middle">Search Vector Index</text>
  <text x="240" y="230" fill="#a7f3d0" font-size="11" text-anchor="middle">cosine similarity → top-k=5 most relevant chunks</text>
  <line x1="240" y1="244" x2="240" y2="264" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="60" y="266" width="360" height="56" rx="10" fill="url(#g-3)" filter="url(#sh)"/>
  <circle cx="90" cy="294" r="14" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1.5"/>
  <text x="90" y="294" fill="white" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="central">3</text>
  <text x="240" y="289" fill="white" font-size="13" font-weight="600" text-anchor="middle">Rerank &amp; Assemble Prompt</text>
  <text x="240" y="308" fill="#e9d5ff" font-size="11" text-anchor="middle">optional reranker → inject context into prompt template</text>
  <line x1="240" y1="322" x2="240" y2="342" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="60" y="344" width="360" height="56" rx="10" fill="url(#g-4)" filter="url(#sh)"/>
  <circle cx="90" cy="372" r="14" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1.5"/>
  <text x="90" y="372" fill="white" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="central">4</text>
  <text x="240" y="367" fill="white" font-size="13" font-weight="600" text-anchor="middle">Generate Answer</text>
  <text x="240" y="386" fill="#fef3c7" font-size="11" text-anchor="middle">LLM reads context + question and generates grounded response</text>
  <line x1="240" y1="400" x2="240" y2="420" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Answer -->
  <rect x="140" y="422" width="200" height="44" rx="22" fill="url(#g-a)" filter="url(#sh)"/>
  <text x="240" y="449" fill="white" font-size="13" font-weight="600" text-anchor="middle">Grounded Answer</text>

  <!-- Side label -->
  <text x="34" y="147" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="middle" transform="rotate(-90,34,216)">INGEST &amp; QUERY</text>
</svg>
