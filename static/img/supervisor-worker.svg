<svg width="580" height="340" viewBox="0 0 580 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="g-user" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g-sup" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284c7"/><stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="g-w1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g-w2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="g-w3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arr-ret" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/></filter>
  </defs>

  <rect width="580" height="340" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="290" y="26" fill="#0f172a" font-size="14" font-weight="700" text-anchor="middle">Supervisor / Worker Pattern</text>

  <!-- User -->
  <rect x="205" y="44" width="170" height="44" rx="22" fill="url(#g-user)" filter="url(#sh)"/>
  <text x="290" y="72" fill="white" font-size="13" font-weight="600" text-anchor="middle">User Task</text>

  <!-- Arrow down to Supervisor -->
  <line x1="290" y1="88" x2="290" y2="112" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Supervisor -->
  <rect x="130" y="114" width="320" height="66" rx="10" fill="url(#g-sup)" filter="url(#sh)"/>
  <text x="290" y="138" fill="white" font-size="13" font-weight="700" text-anchor="middle">Supervisor Agent</text>
  <text x="290" y="156" fill="#bae6fd" font-size="11" text-anchor="middle">plans task · decides which worker to delegate to</text>
  <text x="290" y="172" fill="#bae6fd" font-size="11" text-anchor="middle">DELEGATE(worker): instruction  ·  FINAL: answer</text>

  <!-- Arrows down to Workers -->
  <line x1="120" y1="180" x2="86" y2="212" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="290" y1="180" x2="290" y2="212" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="460" y1="180" x2="494" y2="212" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Worker 1 -->
  <rect x="20" y="214" width="160" height="72" rx="10" fill="url(#g-w1)" filter="url(#sh)"/>
  <text x="100" y="238" fill="white" font-size="12" font-weight="700" text-anchor="middle">Researcher</text>
  <text x="100" y="256" fill="#a7f3d0" font-size="10" text-anchor="middle">WebSearchTool</text>
  <text x="100" y="270" fill="#a7f3d0" font-size="10" text-anchor="middle">WebFetchTool</text>
  <text x="100" y="284" fill="#a7f3d0" font-size="10" text-anchor="middle">searches &amp; summarizes</text>

  <!-- Worker 2 -->
  <rect x="210" y="214" width="160" height="72" rx="10" fill="url(#g-w2)" filter="url(#sh)"/>
  <text x="290" y="238" fill="white" font-size="12" font-weight="700" text-anchor="middle">Writer</text>
  <text x="290" y="256" fill="#e9d5ff" font-size="10" text-anchor="middle">FileWriteTool</text>
  <text x="290" y="270" fill="#e9d5ff" font-size="10" text-anchor="middle">structures content</text>
  <text x="290" y="284" fill="#e9d5ff" font-size="10" text-anchor="middle">drafts &amp; saves</text>

  <!-- Worker 3 -->
  <rect x="400" y="214" width="160" height="72" rx="10" fill="url(#g-w3)" filter="url(#sh)"/>
  <text x="480" y="238" fill="white" font-size="12" font-weight="700" text-anchor="middle">Analyst</text>
  <text x="480" y="256" fill="#fef3c7" font-size="10" text-anchor="middle">PythonREPLTool</text>
  <text x="480" y="270" fill="#fef3c7" font-size="10" text-anchor="middle">SQLQueryTool</text>
  <text x="480" y="284" fill="#fef3c7" font-size="10" text-anchor="middle">computes &amp; charts</text>

  <!-- Return arrows (dashed) -->
  <line x1="86" y1="286" x2="120" y2="300" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-ret)"/>
  <line x1="290" y1="286" x2="290" y2="306" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-ret)"/>
  <line x1="494" y1="286" x2="460" y2="300" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-ret)"/>

  <!-- Return collector -->
  <rect x="160" y="308" width="260" height="24" rx="12" fill="#e2e8f0"/>
  <text x="290" y="325" fill="#475569" font-size="11" font-weight="600" text-anchor="middle">Results synthesized → Final Answer</text>
</svg>
